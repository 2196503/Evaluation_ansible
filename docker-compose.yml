#version: "3.2"

services:

  php:

    build: './php/'
    command:
      - php-fpm
    networks:
      - backend
    volumes:
      - ./monsite/html:/usr/share/nginx/html


  nginx:

    image: nginx:alpine
    depends_on:
      - php
      - mariadb
    restart: always
    networks:
      - frontend
      - backend

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./monsite/html:/usr/share/nginx/html
      - ./monsite/conf:/etc/nginx/conf.d/


  mariadb:

    image: mariadb
    container_name: mariadb
    restart: always

    networks:
      - backend

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword

    ports:
      - "3306:3306"

    volumes:
      - dbdata:/var/lib/mysql



networks:
  frontend:
  backend:


volumes:
  dbdata:
